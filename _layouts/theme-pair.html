---
layout: default
---

<link rel="stylesheet" href="/assets/css/theme-pair-styles.css">

<div class="tp-page">

  <header class="tp-header">
    <div class="tp-header-inner">
      <p class="tp-label">Co-occurrence Analysis</p>
      <h1 class="tp-title">{{ page.title }}</h1>
      <p class="tp-count">{{ page.count }} games in dataset</p>
    </div>
  </header>

  <div class="tp-body">

    <main class="tp-main">
      {{ content }}
    </main>

    <aside class="tp-sidebar">
      <p class="section-label">Games in Dataset</p>
      <ul class="tp-game-list">
        {% for game in page.games %}
        <li>
          <a href="{% if game.url contains 'http' %}{{ game.url }}{% else %}https://{{ game.url }}{% endif %}" target="_blank">{{ game.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </aside>

  </div>

  <nav class="tp-nav">
    <a class="tp-nav-link tp-nav-back" href="/">← Return to Heatmap</a>
    {% if page.next_url %}
    <a class="tp-nav-link tp-nav-next" href="{{ page.next_url }}">{{ page.next_title }} →</a>
    {% endif %}
  </nav>

</div>
